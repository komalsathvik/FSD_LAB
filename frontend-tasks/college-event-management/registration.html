<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Campus Events</a>
      </div>
    </nav>
    <main class="py-5">
      <div class="container">
        <h1>Event Registration</h1>
        <div class="alert alert-success d-none" id="msg">
          Registration completed successfully.
        </div>
        <form class="row g-3" id="eventForm">
          <div class="col-md-6">
            <label class="form-label">Student Name</label
            ><input class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Roll Number</label
            ><input class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Branch</label
            ><input class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label
            ><input type="email" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Mobile Number</label
            ><input class="form-control" pattern="[0-9]{10}" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Event Selection</label
            ><select class="form-select">
              <option>Technical Quiz</option>
              <option>Hackathon</option>
              <option>Poster Presentation</option>
              <option>Coding Contest</option>
              <option>Project Expo</option>
              <option>Cultural Fest</option>
            </select>
          </div>
          <div class="col-12">
            <button class="btn btn-dark">Register</button>
          </div>
        </form>
      </div>
    </main>
    <script>
      eventForm.addEventListener("submit", (e) => {
        e.preventDefault();
        msg.classList.remove("d-none");
      });
    </script>
  </body>
</html>
