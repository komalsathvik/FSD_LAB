<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Campus Events</a>
      </div>
    </nav>
    <main class="py-5">
      <div class="container">
        <h1>Gallery</h1>
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card">
              <img
                class="gallery-img card-img-top img-fluid"
                src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=700&q=80"
                alt="Event photo"
              />
              <div class="card-body">Seminar</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <img
                class="gallery-img card-img-top img-fluid"
                src="https://images.unsplash.com/photo-1531058020387-3be344556be6?auto=format&fit=crop&w=700&q=80"
                alt="Event photo"
              />
              <div class="card-body">Workshop</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <img
                class="gallery-img card-img-top img-fluid"
                src="https://images.unsplash.com/photo-1515169067865-5387ec356754?auto=format&fit=crop&w=700&q=80"
                alt="Event photo"
              />
              <div class="card-body">Celebration</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
