<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAQ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Campus Events</a>
      </div>
    </nav>
    <main class="py-5">
      <div class="container">
        <h1>FAQ</h1>
        <div class="accordion" id="faq">
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button
                class="accordion-button"
                data-bs-toggle="collapse"
                data-bs-target="#a1"
              >
                How to register?
              </button>
            </h2>
            <div
              id="a1"
              class="accordion-collapse collapse show"
              data-bs-parent="#faq"
            >
              <div class="accordion-body">
                Open the registration page, choose an event, and submit your
                details.
              </div>
            </div>
          </div>
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button
                class="accordion-button collapsed"
                data-bs-toggle="collapse"
                data-bs-target="#a2"
              >
                Is there a registration fee?
              </button>
            </h2>
            <div
              id="a2"
              class="accordion-collapse collapse"
              data-bs-parent="#faq"
            >
              <div class="accordion-body">
                Most student events are free unless mentioned by the
                coordinator.
              </div>
            </div>
          </div>
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button
                class="accordion-button collapsed"
                data-bs-toggle="collapse"
                data-bs-target="#a3"
              >
                Can I participate in multiple events?
              </button>
            </h2>
            <div
              id="a3"
              class="accordion-collapse collapse"
              data-bs-parent="#faq"
            >
              <div class="accordion-body">
                Yes, students may participate in multiple events if timings do
                not clash.
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
