<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success"><div class="container"><a class="navbar-brand" href="index.html">Smart College</a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="nav"><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Home</a><a class="nav-link active" href="registration.html">Registration</a><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link" href="profile.html">Profile</a><a class="nav-link" href="contact.html">Contact</a></div></div></div></nav>
  <main class="py-5">
    <div class="container">
      <h1 class="mb-4">Student Registration Form</h1>
      <form class="row g-3 needs-validation" novalidate>
        <div class="col-md-6"><label class="form-label">Full Name</label><input class="form-control" required><div class="invalid-feedback">Full name is required.</div></div>
        <div class="col-md-6"><label class="form-label">Roll Number</label><input class="form-control" required><div class="invalid-feedback">Roll number is required.</div></div>
        <div class="col-md-6"><label class="form-label">Email</label><div class="input-group"><span class="input-group-text">@</span><input type="email" class="form-control" required></div><div class="invalid-feedback">Enter a valid email.</div></div>
        <div class="col-md-6"><label class="form-label">Mobile Number</label><input class="form-control" pattern="[0-9]{10}" maxlength="10" required><div class="invalid-feedback">Enter a 10 digit mobile number.</div></div>
        <div class="col-md-6"><label class="form-label">Gender</label><select class="form-select" required><option value="">Choose...</option><option>Female</option><option>Male</option><option>Other</option></select></div>
        <div class="col-md-6"><label class="form-label">Branch</label><select class="form-select" required><option value="">Choose...</option><option>CSE</option><option>ECE</option><option>Mechanical</option><option>Civil</option></select></div>
        <div class="col-md-6"><label class="form-label">Date of Birth</label><input type="date" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Upload Photo</label><input type="file" class="form-control" accept="image/*" required></div>
        <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" rows="3" required></textarea></div>
        <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" required><label class="form-check-label">I agree to the terms and conditions</label></div></div>
        <div class="col-12"><button class="btn btn-success" type="submit">Submit Registration</button></div>
      </form>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>document.querySelector('form').addEventListener('submit',e=>{if(!e.target.checkValidity())e.preventDefault();e.target.classList.add('was-validated')})</script>
</body>
</html>
