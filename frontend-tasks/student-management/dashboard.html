<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success"><div class="container"><a class="navbar-brand" href="index.html">Smart College</a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="nav"><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Home</a><a class="nav-link" href="registration.html">Registration</a><a class="nav-link active" href="dashboard.html">Dashboard</a><a class="nav-link" href="profile.html">Profile</a></div></div></div></nav>
  <main class="py-5">
    <div class="container">
      <h1 class="mb-4">Student Dashboard</h1>
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3"><div class="card stat-card"><div class="card-body"><p class="text-muted mb-1">Total Students</p><h3>1,240</h3></div></div></div>
        <div class="col-sm-6 col-lg-3"><div class="card stat-card"><div class="card-body"><p class="text-muted mb-1">Present Students</p><h3>1,098</h3></div></div></div>
        <div class="col-sm-6 col-lg-3"><div class="card stat-card"><div class="card-body"><p class="text-muted mb-1">Absent Students</p><h3>142</h3></div></div></div>
        <div class="col-sm-6 col-lg-3"><div class="card stat-card"><div class="card-body"><p class="text-muted mb-1">Placements</p><h3>318</h3></div></div></div>
      </div>
      <input class="form-control mb-3" id="search" placeholder="Search by roll number, name, or branch">
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-success"><tr><th>Roll No</th><th>Name</th><th>Branch</th><th>Attendance</th></tr></thead>
          <tbody>
            <tr><td>101</td><td>Asha Rao</td><td>CSE</td><td><span class="badge text-bg-success">92%</span></td></tr>
            <tr><td>102</td><td>Rahul Mehta</td><td>ECE</td><td><span class="badge text-bg-warning">78%</span></td></tr>
            <tr><td>103</td><td>Neha Singh</td><td>Civil</td><td><span class="badge text-bg-success">88%</span></td></tr>
            <tr><td>104</td><td>Arjun Patel</td><td>Mechanical</td><td><span class="badge text-bg-danger">61%</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script>search.addEventListener('input',()=>{document.querySelectorAll('tbody tr').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(search.value.toLowerCase())?'':'none')})</script>
</body>
</html>
