<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Course Registration</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head>
<body><nav class="navbar navbar-expand-lg navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="index.html">BrightPath</a><div class="navbar-nav ms-auto"><a class="nav-link" href="courses.html">Courses</a></div></div></nav>
<main class="py-5"><div class="container"><h1>Course Registration</h1><div id="success" class="alert alert-success d-none">Registration submitted successfully.</div><form class="row g-3" id="regForm"><div class="col-md-6"><label class="form-label">Student Name</label><input class="form-control" required></div><div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" required></div><div class="col-md-6"><label class="form-label">Mobile Number</label><input class="form-control" pattern="[0-9]{10}" required></div><div class="col-md-6"><label class="form-label">Gender</label><select class="form-select" required><option value="">Choose</option><option>Female</option><option>Male</option><option>Other</option></select></div><div class="col-md-6"><label class="form-label">Course Selection</label><select class="form-select" required><option>Web Development</option><option>Python Programming</option><option>Data Science</option><option>AI & Machine Learning</option><option>Java Programming</option><option>Cloud Computing</option></select></div><div class="col-md-6"><label class="form-label">Qualification</label><input class="form-control" required></div><div class="col-12"><label class="form-label">Address</label><textarea class="form-control" rows="3" required></textarea></div><div class="col-md-6"><label class="form-label">Upload Resume</label><input type="file" class="form-control" required></div><div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" required><label class="form-check-label">I accept terms & conditions</label></div></div><div class="col-12"><button class="btn btn-primary">Submit</button></div></form></div></main><script>regForm.addEventListener('submit',e=>{e.preventDefault();success.classList.remove('d-none')})</script></body></html>
