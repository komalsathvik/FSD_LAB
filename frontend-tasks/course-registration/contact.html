<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact BrightPath</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">BrightPath</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="index.html">Home</a
          ><a class="nav-link active" href="contact.html">Contact</a>
        </div>
      </div>
    </nav>
    <main class="py-5">
      <div class="container">
        <h1>Contact Us</h1>
        <div class="row g-4">
          <div class="col-lg-6">
            <form class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label
                ><input class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label
                ><input type="email" class="form-control" />
              </div>
              <div class="col-12">
                <label class="form-label">Message</label
                ><textarea class="form-control" rows="5"></textarea>
              </div>
              <div class="col-12">
                <button class="btn btn-primary">Send</button>
              </div>
            </form>
          </div>
          <div class="col-lg-6">
            <div class="map-box rounded mb-3">Google Map Placeholder</div>
            <p><strong>Address:</strong> 42 Learning Street, Pune</p>
            <p><strong>Phone:</strong> +91 98765 12340</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
