<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center text-primary mb-4">Bootstrap Demo Page</h1>

      <div class="alert alert-success">Welcome to Bootstrap!</div>

      <div class="mb-4">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
      </div>

      <div class="row text-center">
        <div class="col-md-4 bg-light p-3 border">Column 1</div>

        <div class="col-md-4 bg-warning p-3 border">Column 2</div>

        <div class="col-md-4 bg-info p-3 border">Column 3</div>
      </div>

      <div class="card mt-4" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title">Bootstrap Card</h5>
          <p class="card-text">This is a simple card component.</p>
          <a href="#" class="btn btn-primary"> Learn More </a>
        </div>
      </div>
    </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
